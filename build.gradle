plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    mavenCentral()
    maven {
        name = "NeoForged"
        url = "https://maven.neoforged.net/releases"
    }
    maven {
        name = "Create Maven"
        url = "https://maven.createmod.net"
    }
    maven {
        name = "Registrate"
        url = "https://maven.ithundxr.dev/snapshots"
    }
    maven {
        name = "Deployer Maven"
        url = "https://maven.liukrast.net"
    }
    maven {
        name = "BlameJared (JEI)"
        url = "https://maven.blamejared.com"
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

// Optional "fluids/energy via packages" addon jars (lib/). CreateFluidLogistic ("fluidlogistics"), CreateFluid
// ("fluid") and Create: Repackaged ("repackaged") all hook the same package/logistics system and are mutually
// incompatible at runtime, so exactly ONE is put on the dev runtime, chosen by -PfluidRuntime. We COMPILE against
// the two fluid-FILTER addons (compileOnly) so both FluidFilterProviders build regardless; repackaged has no
// compat code yet, so it's runtime-only (for exploration/testing).
//   -PfluidRuntime=none      (default) → neither (the base runClient stays addon-free)
//   -PfluidRuntime=cfl                 → CreateFluidLogistic
//   -PfluidRuntime=createfluid         → CreateFluid
//   -PfluidRuntime=repackaged          → Create: Repackaged (+ its required compat_manager from maven)
// The IntelliJ ".run/" folder ships ready-made buttons for the CFL, CreateFluid and Repackaged variants.
def fluidLogisticsJar = fileTree(dir: "lib", include: ["fluidlogistics-*.jar"])
def createFluidJar = fileTree(dir: "lib", include: ["fluid-*.jar"])
def repackagedJar = fileTree(dir: "lib", include: ["repackaged-*.jar"])
def fluidRuntime = (project.findProperty('fluidRuntime') ?: 'none').toString().toLowerCase()

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    localRuntime
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // Create mod (compile + dev runtime; Flywheel/Registrate/Ponder come in transitively)
    compileOnly "com.simibubi.create:create-1.21.1:${create_version}"
    localRuntime "com.simibubi.create:create-1.21.1:${create_version}"

    // Deployer (hard dependency — custom gauge registry).
    // Consume as a plain jar (transitive = false): Deployer's published runtimeElements variant
    // declares a messy dependency graph (create:slim — which has no NeoForge 1.21.1 artifact —
    // plus curse.maven:* and mezz.jei optional compat from unconfigured repos). IntelliJ's
    // variant-aware source-set importer chokes on that graph and silently drops ALL module
    // dependency wiring (every external import goes red). Its real transitives (Create, Registrate,
    // Ponder, Flywheel) already come from the explicit Create dependency above.
    compileOnly("net.liukrast:deployer-1.21.1:${deployer_version}") { transitive = false }
    localRuntime("net.liukrast:deployer-1.21.1:${deployer_version}") { transitive = false }

    // JEI (optional): compile against the API only; run the full mod in dev for testing.
    compileOnly "mezz.jei:jei-1.21.1-neoforge-api:${jei_version}"
    localRuntime "mezz.jei:jei-1.21.1-neoforge:${jei_version}"

    // Fluid-logistics addons (optional/soft): CreateFluidLogistic (modid "fluidlogistics") and CreateFluid
    // (modid "fluid"), consumed from local jars in lib/ (neither is on a maven). We COMPILE against both so both
    // FluidFilterProviders build; every use of either addon's classes is guarded by ModList.isLoaded(...), so the
    // mod loads and runs fine with either or neither. The two are MUTUALLY INCOMPATIBLE at runtime, so exactly ONE
    // is added to the dev runtime via localRuntime, selected by -PfluidRuntime (see the fluidRuntime def above).
    // localRuntime jars are scanned as mods by NeoForge in dev (unlike a per-run additionalRuntimeClasspath, which
    // is only a library on the module path and never loads as a mod).
    compileOnly fluidLogisticsJar
    compileOnly createFluidJar
    if (fluidRuntime == 'cfl') {
        localRuntime fluidLogisticsJar
    } else if (fluidRuntime == 'createfluid') {
        localRuntime createFluidJar
    } else if (fluidRuntime == 'repackaged') {
        localRuntime repackagedJar
        // Create: Repackaged hard-depends on Compat Manager (liukrast maven, not bundled).
        localRuntime("net.liukrast:compat_manager-1.21.1:${compat_manager_version}") { transitive = false }
    }
}

// The fluid-FILTER addon jars (lib/) aren't on any maven and aren't in the repo, so on a clean checkout (e.g. CI)
// they're absent and their provider can't compile. When a jar is missing, drop just that one provider source from
// compilation; FluidCompat instantiates the providers reflectively, so it builds (and at runtime skips any provider
// whose class was excluded). With the lib/ jars present (dev) nothing is excluded and both providers compile as usual.
tasks.named('compileJava') {
    if (fluidLogisticsJar.isEmpty()) exclude '**/compat/fluids/CflFluidProvider.java'
    if (createFluidJar.isEmpty()) exclude '**/compat/fluids/CreateFluidProvider.java'
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            deployer_version       : deployer_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
