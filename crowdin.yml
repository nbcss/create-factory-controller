project_id_env: "CROWDIN_PROJECT_ID"
api_token_env: "CROWDIN_PERSONAL_TOKEN"
base_path: .

preserve_hierarchy: true

files:
  - source: src/main/resources/assets/createfactorycontroller/lang/en_us.json
    translation: src/main/resources/assets/createfactorycontroller/lang/%locale_with_underscore%.json
    languages_mapping:
      locale_with_underscore:
        pl: pl_pl
        ru: ru_ru
        zh-CN: zh_cn
