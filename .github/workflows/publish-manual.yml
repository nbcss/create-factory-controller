name: Publish manual

on:
  push:
    branches:
      - main
    paths:
      - manual/**
      - .github/workflows/publish-manual.yml

jobs:

  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: manual

      - name: Check for container changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            container:
              - manual/Containerfile
              - manual/Gemfile
              - manual/Gemfile.lock

      - name: Log in to GitHub Container Registry
        if: steps.filter.outputs.container == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push manual-builder
        if: steps.filter.outputs.container == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./manual
          file: ./manual/Containerfile
          tags: ghcr.io/${{ github.repository }}/manual-builder:latest
          push: true

  build:
    needs: build-container
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          lfs: true
          sparse-checkout: manual

      - name: Build manual
        run: docker run --rm --volume "${{ github.workspace }}/manual:/work" ghcr.io/${{ github.repository }}/manual-builder:latest rake build

      - name: Prepare Pages content
        run: |
          mkdir -p _site/manual
          cp -a manual/build/. _site/manual/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
