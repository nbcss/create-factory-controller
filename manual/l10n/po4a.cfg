[po4a_langs] pl ru zh-hans
[po4a_paths] $master.pot $lang:$master.$lang.po

[options] --keep 50 --width 0 --wrap-po newlines \
  -o tablecells -o noimagetargets \
  --package-name "Create: Factory Controller Manual" \
  --package-version "1" \
  --copyright-holder "Contributors" \
  --master-language en

[type: asciidoc] ../src/index.adoc             $lang:../translated/$lang/index.adoc             pot=index
[type: asciidoc] ../src/dashboard.adoc         $lang:../translated/$lang/dashboard.adoc         pot=dashboard
[type: asciidoc] ../src/components.adoc        $lang:../translated/$lang/components.adoc        pot=components
[type: asciidoc] ../src/factory-gauge.adoc     $lang:../translated/$lang/factory-gauge.adoc     pot=factory-gauge
[type: asciidoc] ../src/electron-tube.adoc     $lang:../translated/$lang/electron-tube.adoc     pot=electron-tube
[type: asciidoc] ../src/redstone-link.adoc     $lang:../translated/$lang/redstone-link.adoc     pot=redstone-link
[type: asciidoc] ../src/blueprint.adoc         $lang:../translated/$lang/blueprint.adoc         pot=blueprint
[type: asciidoc] ../src/display-link.adoc      $lang:../translated/$lang/display-link.adoc      pot=display-link
[type: asciidoc] ../src/production-orders.adoc $lang:../translated/$lang/production-orders.adoc pot=production-orders
